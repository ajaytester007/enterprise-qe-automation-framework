name: QE Framework CI
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-and-api-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run smoke gate
        run: mvn clean test -Psmoke -Dheadless=true
      - name: Run API and DB checks
        run: mvn test -Papi-db -Dheadless=true
      - name: Publish surefire evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports
