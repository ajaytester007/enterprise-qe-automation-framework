name: QE Framework CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-and-api-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run enterprise QE validation suite
        run: mvn clean test -DsuiteXmlFile=testng-parallel.xml -Dheadless=true

      - name: Publish surefire evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn